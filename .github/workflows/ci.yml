name: Plugin Validation

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Check plugin.json
        run: |
          if [ ! -f .claude-plugin/plugin.json ]; then
            echo "FAIL: .claude-plugin/plugin.json is required"
            exit 1
          fi
          python -c "
          import json, sys
          try:
              m = json.load(open('.claude-plugin/plugin.json'))
          except json.JSONDecodeError as e:
              print(f'FAIL: plugin.json is not valid JSON: {e}')
              sys.exit(1)
          required = ['name', 'version', 'description', 'author', 'homepage', 'repository']
          missing = [f for f in required if f not in m]
          if missing:
              print(f'FAIL: Missing org-required fields: {missing}')
              sys.exit(1)
          print('PASS: plugin.json has all required fields')
          "

      - name: Check skills
        run: |
          if [ -z "$(ls -d skills/*/ 2>/dev/null)" ]; then
            echo "FAIL: skills/ directory must contain at least one skill"
            exit 1
          fi
          FAILED=0
          for skill_dir in skills/*/; do
            skill_name=$(basename "$skill_dir")
            if [ ! -f "$skill_dir/SKILL.md" ]; then
              echo "FAIL: $skill_dir is missing SKILL.md"
              FAILED=1
              continue
            fi
            if grep -q 'description:' "$skill_dir/SKILL.md"; then
              echo "PASS: skills/$skill_name/SKILL.md has description"
            else
              echo "FAIL: skills/$skill_name/SKILL.md is missing description in frontmatter"
              FAILED=1
            fi
          done
          if [ "$FAILED" -eq 1 ]; then
            exit 1
          fi

      - name: Check PreToolUse guard
        run: |
          if [ ! -f hooks/hooks.json ]; then
            echo "FAIL: hooks/hooks.json is required"
            exit 1
          fi
          if ! grep -q 'PreToolUse' hooks/hooks.json; then
            echo "FAIL: hooks/hooks.json must configure a PreToolUse hook"
            exit 1
          fi
          echo "PASS: hooks/hooks.json configures PreToolUse"
          if [ ! -f hooks/validate-bash.sh ]; then
            echo "FAIL: hooks/validate-bash.sh is required"
            exit 1
          fi
          if [ ! -x hooks/validate-bash.sh ]; then
            echo "FAIL: hooks/validate-bash.sh must be executable"
            exit 1
          fi
          echo "PASS: hooks/validate-bash.sh exists and is executable"

      - name: Check README
        run: |
          if [ ! -f README.md ]; then
            echo "FAIL: README.md is required"
            exit 1
          fi
          echo "PASS: README.md exists"
          if grep -qE '\{[A-Za-z]' README.md; then
            echo "::warning::README.md still contains placeholder fields"
          fi
